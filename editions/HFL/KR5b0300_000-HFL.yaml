front:
  text: 江淮異人録惟三
  hash: sha256:49ccd29a845773d62811679288480d6645537630a2372a754f7552d9ae98068d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0300_HFL_000-001a, image: hfl/0329/0329-074.png}
body:
  text: 司馬郊司馬郊一名凝正一名守中遊於江表常被冠褐躡屐而行日可千百里衣褐不改作而常新所爲麤暴人無敢近之者能詐死以至青腫臭腐俄而復活嘗止於宣州開元觀自宣之歙時道士紹修黙亦往歙州至城門遇之與同行修黙避之先往至一鎮戍方息於逆旅郊續至修默隱身潜窺之見郊入别店中召主人與飮因而淩辱之主人初亦敬謝郊不爲已而更擊之旣而互相搏擊郊忽踣於地視之已死體冷色變一市皆聚觀乃召集鄉里縳其主人撿屍責詞將送於州時已向夕欲明旦乃行至中夜復聞店中喧然曰已失司馬尊師矣而人方悟郊詐死釋其主人修黙明日侵曉乃行至前百里許問人曰司馬尊師何時過此曰今早已過矣明日復行百里問之曰昨日已早過矣及到歙州問之亦然毎往來上江諸州至一旅舍安泊久之將去告其主曰我所有竹器不能將行取火焚之主人曰方風髙且竹屋低隘不可舉火郊不已衆人共拜勸之郊怒不聽乃發火於室中持一大杖立於門側敢至者擊之郊有力人無敢近之者俄而火盛熖出於竹瓦之隙人皆惶駭旣而火滅郊所有器什皆盡所卧牀皆重灼而薦席無有焦者有朱翺者爲池州法禒郊過詣之謂朱曰君色甚惡當病我即去君病中能念我或呼我姓名當有所應翱不之信後十餘日果病熱疾數日甚劇忽憶郊之言意甚神之因稽首思念求祐初朱已病惡見人在己前有小吏陳某者常指使如意令入室侍疾亦叱去之家人守之戸外無得入者至是朱恍惚見陳某持一甌藥進之朱飮之便覺意爽體佳呼家人曰適陳某所持來藥甚効當令更進一服家人驚曰比不令人入室陳安得至此朱乃悟郊之垂祐也自是朱疾漸平郊嘗居歙州某觀病痢困劇觀主欲申白官司先以意聞郊郊怒曰吾疾方愈何勞若此旣漸困篤觀主不得已乃口白縣令姚藴藴使人候問之郊曰姚長官何故知吾病也來者以告郊怒忽起結束徑入某山中其行如飛後十餘日持一大杖求觀主將捶之觀中道士共禮拜求救乃免嘗至洪州市中探鮓食之市中小兒呼曰道士喫鮓郊怒以物擊小兒中流血巡人執郊送於虞候素知其名方善勸説之郊乃極口罵怒虞候不勝其忿杖之至十郊謂人曰彼杖我十五可得十五日活杖我十十日死矣旣而果然後入廬山居簡寂觀因醉卧數日而卒臨終令置一杖於棺中及葬覺棺空發之唯杖在焉錢處士錢處士天祐末遊於江淮嘗止於金陵楊某家初吳朝以金陵爲州築城西抛江東至潮溝錢指城西里餘荒穢之地勸楊賈之楊從其言及建爲都邑而楊氏所買地正在繁㑹之處乃搆層樓爲酒肆焉嘗宿於楊家中夜忽起謂人曰地下兵馬喧闐云接令公聒我不得眠人皆莫之測也明日義祖自京口至金陵時人無有預知者嘗見一人謂之曰爾天罰將及可急告謝自責人曰我未省有過錢曰爾深思之人良久乃曰昨日飲食不如意因怒其下棄食於溝中錢曰正是此爾可急取所棄食之乃取之將以水汰去其穢俄而雷電大震錢曰急取穢食之如言而雷電果息嘗有人圖錢之狀錢見之曰吾反不若此常對聖人也人不之悟後有僧取其圖置於誌公塔中人以爲應後烈祖復取之入宫陳於内寢焉又毎爲䜟語説方來事言李氏之祚曰髣髴之間一倍楊初吳氏有江之地凡四十六年而李氏三十九年或謂楊氏自稱尊至禪代二十年故髣髴倍之耳聶師道聶師道歛人少好道唐末于濤爲歙州刺史其兄方外爲道士居於郡南山中師道往事之濤時往詣方外至於郡政咸以諮之乃名其山爲問政山吳朝以師道嘗居是山因號爲問政先生焉初方外在山中郡人少信奉者及師道至𧵥信日至而富實師道嘗與友人同行至一逆旅友病熱疾村中無復醫藥或教病者曰能食少不潔可以解及病危因復勸之人有難色師道諭之曰事急矣何難於此吾爲汝先嘗之乃取㗖之人感其意乃食而病果愈後給事中裴樞爲歙州當唐祚之季詔令不通宣州田頵池州陶雅舉兵圍之累月歙人頻破之後食盡援絶議以城降而城中殺外軍已多無敢將命出者師道乃自請行樞曰君乃道士豈可遊兵革中耶請易服以往師道曰吾已受道法科教不容易服乃縋之岀城二將初亦甚怪及與之語乃大喜曰眞道人也誓約已定復遣還城中及期樞適有未盡復欲延期更令師道出諭之人謂其二三咸爲危之師道亦無難色及復見二將皆曰無不可唯給事命時城中人獲全師道之力也吳太祖聞其名召至廣陵建紫極宫以居之一夜有羣盜入其所止至於什器皆盡取之師道謂之曰汝爲盜取吾財以救飢寒也持此將安用之乃引於曲室盡取金帛與之仍謂之曰爾當從其處出無廵人可以無患盜如所教竟以不敗後吳朝遣師道至龍虎山設醮道遇羣盜劫之將加害其中一人熟視師道謂同黨曰勿犯先生令盡以所得還之羣盜亦皆從其言因謂師道曰某即昔年揚洲紫極宫中爲盜者感先生至仁之心今以奉報後卒于廣陵時方遣使於湖湘使還至某處見師道問之曰何以至此師道曰朝延遣我醮南嶽使者以爲然及入呉境方知師道卒矣師道姪孫紹元少入道風貌和雅善屬文年二十餘卒初紹元旣病劇有四鶴集於紹元所處屋上及其卒人見五鶴沖天而去于大于大居洪州西山中無四時常持花不欲近人嘗至應聖宮以花置道像前道士爲設茶置之食案須人退于及取飲飲訖置茶盞於案長揖而去人或揖之亦復相揖但不與人語耳有少年好道欲往事之而不能得一日少年拜曰願事先生于走不顧少年逐之而持其衣于驅之不去上山渡水不暫置之至一處臨水而坐問少年曰頗渴否曰然懷中出物如茶末與之曰置此口中掬水下之如言須臾因睡及覺失之矣李夢符李夢符者常遊洪洲市井中年可二十餘短小而潔白美秀如玉人以放蕩自恣四時常揷花徧歷城中酒肆髙歌大醉好事者多召之與飮或令爲歌詞應聲爲之初不經心而各有意趣鍾傳之鎮洪州也以其狂妄惑衆將罪之夢符於獄中獻詩十餘首其略曰揷花飲酒無妨亊樵唱漁歌不礙時鍾竟亦不罪後桂州刺史李瓊遣使至洪州言夢符乃其弟也請遣之鍾令求於市中旅舍人曰昨夢符不歸因爾不知所終劉同圭劉同圭者居洪州詣艾氏家賃其屋而居家唯翁媪而已旦持一筐蕈賣之夕而醉歸積久隣人怪之夜穴壁窺之見出一缶土以水噀之須臾蕈生及曉刈之後翁病謂媪曰我死必置一杖於棺中及卒如其言初舉棺以出人覺其重及至半路漸輕如無流蕩其棺唯覺杖在其中發之獨得杖耳耿先生耿先生者江表將校耿謙之女也少而明慧有姿色頗好書稍爲詩句往往有嘉旨而明於道術能拘制鬼魅通於黄白之術變怪之事竒偉恍惚莫知其何從得也保大中江淮富盛上好文雅恱竒異之事召之入宮益觀其術不以貫魚之列待特處之别院號曰先生先生常被碧霞帔見上多持簡精彩卓逸言詞朗暢手如鳥爪不便於用飲食皆仰於人復不喜行宫中常使人抱持之毎爲詩句題於牆壁自稱北大先生亦莫知其旨也先生之術不常的然發揚於外遇事則應黯然而彰上益以此重之也始入宫問以黄白之事試之皆驗益復爲之而簡易不煩上嘗因暇預謂先生曰此皆因火以成之茍不須火其能乎先生曰試爲之殆亦可上乃取水銀以硾紙重複裹之封題甚宻先生内於懷中良久忽若裂帛聲先生笑曰陛下常不信下妾之術今日面觀可復不信耶持以與上上周視題處如舊發之已爲銀矣又嘗大雪上戲之曰先生能以雪爲銀乎先生曰亦可乃取雪實之削爲銀鋌狀先生自投於熾炭中灰埃坌起徐以炭周覆之過食頃曰可矣乃持以出赫然洞赤置之於地及冷爛然爲鋌銀而刀迹具在反視其下若垂酥滴乳之狀蓋初爲火之所融釋也因是先生所作雪銀甚多上誕日毎作器用獻以爲夀又多巧思所作必出於人南海嘗貢竒物有薔薇水龍腦漿薔薇水清泚郁烈龍腦漿補益男子上寳惜之毎以龍腦槳調酒服之香氣連日不絶於口亦以賜近臣先生曰此未爲佳也上曰先生豈能爲之曰試爲應亦可就乃取龍腦以細絹袋之懸於瑠璃甁中上親封題之置酒於其側而觀之食頃先生曰龍腦已漿矣上自起附耳聽之果聞滴瀝聲且復飲少選又視之見瑠璃瓶中湛然如勺水矣明日發之已半瓶香氣酷烈逾於舊者逺矣先生後有孕一日謂上曰妾此夕當産神孫聖子誠在此耳請備生産所用之物上悉爲設之益令宫人宿於室中夜半烈風震霆室中人皆震懼是夜不復産明旦先生腹已消如常人上驚問之先生曰昨夜雷電中生子已爲神物持去不復得矣先生嗜酒至於男女太慾亦略同於常後亦竟以疾終古者神仙多晦跡混俗先生豈其人乎余頃在江南常聞其事而宫掖祕奥説者多異同及江南平在京師嘗詣徐率更游游即義祖之孫也宫中之事悉能知之因就質其事備爲余言潘扆潘扆者大理評事潘鵬之子也少居於和州樵採鷄籠山以供飬其親嘗過江至金陵泊舟秦淮口有一老父求同載過江扆敬其老許之時大雪扆市酒與同飮及江中流酒已盡扆甚恨其少不得醉老父曰吾亦有酒乃解巾於髻中取一小胡蘆子傾之極飲不竭扆驚益敬之及至岸謂扆曰子事親孝復有道氣可教也乃授以道術扆自是所爲詭異世號之爲潘仙人能掬水銀於手中接之即成銀嘗入人家見池沼中有落葉甚多謂主人曰此可以爲戲令以物漉取之置之於地隨葉大小皆爲魚矣更棄於水葉復如故有蒯亮者常至所親家同坐者數人見扆過於門主人召之乃至因謂扆曰請先生出一術以娯賔扆曰可顧見門前有鐡砧謂主人曰得此鐵砧可以爲戲因就假之旣至扆乃出一小刀子細細切之至盡坐客驚愕旣而曰假人物不可壞之也乃合聚之砧復如故又於袖中岀一幅舊方巾謂人曰勿輕此非一人有急不可從余假之他人固不能得也乃舉以蔽面退行數歩則不復見能背本誦所未嘗見書或卷而封之置之於前首舉一字則誦之終卷其間點竄塗乙悉能知之所爲多此類亦不復盡紀後亦以疾卒潤州處士潤州處士失姓名髙尚有道術人皆敬信之安仁義之叛也郡人惶駭咸欲奔潰或曰處士恬然居此必無恙也於是人稍安堵處士有所親挈家出郡境以避難有女已適人不克同往託於處士處士許之旣而圍急處士謂女曰可持汝家一物來吾令汝免難女乃取家中一刀以往處士刀邊以手抑按之復與之曰汝但持此若端簡然伺城中出兵隨之以出可以無患如言在萬衆中無有見之者至城外數十里村店中見其兄亦在焉女至兄前兄不之見也乃棄刀於水中復往兄乃見之驚曰安得至此女具以告兄復令取刀持之則不能蔽形矣後城陷處士不知所之洪州將校鍾傳之鎮洪州也嘗遣衙中將校晏某使於浙中晏至杭州時方寒食州人出城士女闐委晏亦出觀之見翁嫗二人對飮於野中其翁忽爾乗雲而上萬衆喧呼嫗仰望慟哭翁爲下十數丈以手慰止之俄而復上極髙而没洪州艾氏其先識晏親聞其說史公鎬史公鎬者江南大將史公銖弟也性沖淡樂道未嘗見其喜怒人或干之亦不以介懷旣貴盛衣服鮮楚毎至人家必解衣而坐不以賔主爲意及去誤著他人故弊衣亦不之覺也或持其衣逐之方悟乃易之兵部尚書張翰典銓公鎬求爲楊子令會已除官不果翰見其曠達多可試謂之曰且爲楊子尉可乎公鎬亦忻然從之後爲瑞昌令卒於官時方晴霽而所居宅上獨雲雨人有望見雲雨之上有一人緋衣乗馬冉冉而上極髙而没江處士歙州江處士性沖寂好道能制鬼魅鄉里中嘗有婦人鬼所附著家人或髣髴見之一夜其夫覺有人與婦共寢乃急起持之呼人取火共縳及火至正見捉己所繫腰帶也廣求符禁終不能絶乃往詣江江曰吾雖能禦之然意不欲與鬼神爲讎爾旣告我當爲遣之令歸家灑掃一室令一童子烹茶待吾至無得令人輙窺如其言江尋至入室坐令童子出迎客果見一緑衣少年貌甚端雅延之入室見江再拜江命坐乃坐啜茶不交一言再拜而去自是婦人復常有人入山伐木因爲鬼物所著自言曰樹乃我之所止汝今旯伐吾將何依當假汝身爲我窟宅自是其人覺皮膚之内有物馳逐自首至足靡所不至人不勝其苦往詣江人未至鬼已先往江所居有樓樓北有茂竹江方坐樓上覺神在竹林中呼問之鬼且以告且求赦過江曰吾已知矣尋而人至謂之曰汝可於鄕里中覓空屋人不居者復來告吾人往尋得之江以方寸紙置名與之戒之曰至室屋棄之如言而病失又嘗有人爲䕫鬼所撓其家置圗晝於樓上皆爲穢物所汚以告之江曰但封閉樓門三日當使去之如言三日開之穢物盡去圖畫如故余有所知世居歙州親見其事李勝書生李勝嘗遊洪州西山中與處士盧齊及同人五六輩雪夜共飲座中一人偶言曰雪勢若此固不可出門也勝曰欲何所詣吾能往之人因曰吾有書籍在星子君能爲我取之乎勝曰可乃出門去飲未散携書而至星子距西山凡三百餘里也游帷觀中有道士嘗不禮勝勝曰吾不能殺之𦕅使其懼一日道士閉戸寢於室勝令童子叩戸取李處士匕首道士起見所卧枕前揷一匕首勁勢猶動自是改心禮勝建康貧者建康開城之東郟壇門外嘗有一人不言姓名於此面野水搆小屋而居纔可庇身屋中唯什器一兩事餘無他物日日入城云乞丐亦不歷街巷市井但入寺逍遥遊觀而已人頗知之廵使以白上上令尋迹其岀處而問其所欲及問之亦無所求時盛寒官方施貧者衲衣見其劇單以一衲衣與之辤不受强與之乃轉以與人益怪之因逐之使移所居且觀其所向乃毀屋移於玄武湖西南内臣張謀果園多荒穢亦有野水復於水際搆屋居之時大雪數日園人不見其出入意其凍死觀之見屋已壞曰果死矣遂白官司旣發屋視之則方熟寢於雪中驚起了無寒色乃去不知所之陳允升陳允升饒州人也人謂之陳百年少而靜黙好道家世弋獵允升獨不食其肉亦不與人交言十歳詣龍虎山入道棲隠深邃人鮮得見之者家人或見之則奔走不顧天祐中人見於撫州麻姑山計其去家七十年矣而顏貌如初昇元中刺史危全諷少知其異迎置郡中獨處一室時或失之嘗夜坐危謂之曰豐城橘美頗思之允升曰方有一船橘泊牢城港今爲取之港距城十五里少選便還携一布嚢可數百顆因共食之危嘗有姻禮市黄金郡中少不足用頗呵責其下允升曰無怒吾能爲之乃取厚紙以藥塗之投於火中皆成金因以足用後危與吳師戰允升去之曰愼勿入口中全諷不知悟果敗於象牙潭陳曙陳曙蘄州善壇觀道士也人謂爲百歳實亦不知其年歩行日數百里郡人有宴席常虚一位以待之逺近必至烈祖聞而召之使者未至忽歎息曰吾老矣何益於國而枉見召後數日而使者至再召竟不行保大中常至夜獨焚香於庭仰天拜祝退而慟哭俄而淮上兵革人以爲預知也復過江居於永興景星廢觀結廬獨居常有虎豹隨之人亦罕有見者及卒數日方棺斂而遍體發汗焉張訓妻張訓者吳太祖之將校也口大時人謂之張大口呉太祖在宣州常給諸將鎧甲訓所得故弊不如意形於言色其妻謂之曰此不足介意但司徒不知茍知之必不耳明日呉公謂張曰爾所得甲如何張以告公乃易之後吳公移廣陵嘗賜諸將馬訓所得復駑弱訓亦不滿意妻復言如前明日呉公又問之訓復以爲言公曰爾家事神耶訓曰無公曰吾頃在宣州嘗賜諸將甲是夜夢一婦人衣眞珠衣告予曰公賜張訓甲甚弊當爲易之乃吾問汝果然乃爲汝易之今賜諸將馬復夢前珠衣婦人告予曰張訓所得馬非良馬也其故何哉訓亦不能測也訓妻有衣箱常自啓閉訓未嘗見之一日妻出訓竊啓之果見珠衣一襲及妻歸謂訓曰君開我衣箱耶初其妻毎食必持其夫一日訓歸妻已先食謂訓曰今日以食味異常不待君先食矣訓入𢊍見甑中蒸一人頭訓心惡之隂欲殺之妻謂曰君欲負我耶然君方爲數郡刺史我不能殺君指一婢曰殺我必先殺此不爾君必不免訓遂殺妻及其婢後果爲刺史董紹顏董紹顔者能知人嘗詣鄂州節度使李簡簡出諸子以侍紹顔時有平頭小兒何敬洙侍簡側紹顏曰諸子亦皆貴然不若此平頭也後敬洙累授節鎮爲時名將焉義祖鎮潤州紹顔在焉常閱衙中諸將校品第之有藍彦思者謂紹顔曰爾多言或中也紹顏曰君勿言郎君非善終者彦思曰吾軍校死於鋒刃事吾事也何足言哉紹顏曰汝寧得好鋒刃之下而死乎後郡中稍有火衙中亦爲之備盛造桶以貯水而軍人因是持桶刀爲亂彥思死於難焉魏王軍士義祖子魏王知證鎮宣州有軍士失姓名家唯夫妻而已一日夫自外歸求水沐浴換新衣坐繩牀而終妻見之大驚曰君死耶於是不哭亦沐浴換衣與夫對坐而卒魏王因並塚葬之沈汾唐末沈汾侍御退居樂道家有二妾一日謂之曰我若死爾能哭我乎妾甚愕曰安得不祥之言因問之對曰茍若此安得不哭汾曰汝今試哭吾欲觀之妾初不從强之不已妾走避之汾執而扶之妾不得已乃曰君但升榻而坐汾如言二妾左右擁袂而哭畢視之汾已卒矣䖍州少年䖍州將校鐘某者泛舟之廣陵經太和戍泊舟登岸見一少年貌甚端雅亦求同載往掦州鍾許之遂同行因江次上岸共行市中見屠肆有豕首欲市之而無錢少年曰此亦小事及還船出豕首於袖中因曰適以無錢而取之今當還其值乃復至屠所謂曰吾先付爾錢少頃還取肉屠得錢乃不復取肉及至廣陵與鍾同舍於逆旅一日有輕俠數人行戲至店中少年指一青衣曰此必今夕爲盜耳冝備之鍾不甚信中夜覺穴壁聲伺其已穿引首過竇乃舉燭急持之果少年所指者因謂盜曰汝未獲財不欲殺汝遂聽其去後忽謂鍾曰不可久處促之歸去鍾如言及至日沙而朱瑾殺昌化城中驚擾焉閩中處士閩中處士張摽者有道術能通於冥府或三日五日卧如死而體不冷旣蘇多説冥中事或言未來一一皆驗郡中大信之王保冝者唐末爲閩師持章赴朝廷道路不通乃泛海因溺死其孫侃留居閩中因家人疾請摽禱於冥府摽從之因曰見君之先父在水府有冥職言其家事委曲一一皆是洪州書生成幼文爲洪州録事叅軍所居臨通衢而有牎一日坐牕下時雨霽泥濘而微有路見一小兒賣鞋狀甚貧窶有一惡少年興兒相遇絓鞋墜泥中小兒哭求其價少年叱之不與兒曰吾家旦未有食待賣鞋營食而悉爲所汚有書生過憫之爲償具值少年怒曰兒就我求錢汝何預焉因辱罵之生甚有愠色成嘉其義召之與語太竒之因留之宿夜共話成暫入內及復出則失書生矣外戸皆閉求之不得少頃復至前曰旦來惡子吾不能容已斷其首乃擲之於地成驚曰此人誠忤君子然斷人之首流血在地豈不見累乎書生曰無苦乃出少藥傳於頭上捽其髮摩之皆化爲水因謂成曰無以奉報願以此術授君成曰某非方外之士不敢奉教書生於是長揖而去重門皆鎻閉而失所在糝潭漁者吳太祖爲廬州八營都廵警至糝潭憩於江岸有漁父鼔舟直至前饋魚數頭曰此猶公子孫鱗次而覇也因四指曰此皆公之山川吳公異之將遺以物不顧而去瞿童瞿童字栢庭以字爲名辰州辰谿人也華眉廣顙長準秀目勤事而寡言大曆四年西川潰將楊林爲澧陽守不戢部下兵縱其黨賈子華率千人假道武陵劫五溪五溪之人逃難四散時栢庭十四侍母走武陵寓居崇義鄕烏頭里桃源觀道士黄山寳偏宅栢庭因山寳願師事上清三洞法師黄洞源山寳引覿具道栢庭志洞源辭以栢庭奉母須甘㫖山寳曰栢庭母在山寳廬幸有繼給倘蒙收拾貧賤所望容納洞源許之後亦時給栢庭母衣食僅二周載六年正月栢庭喪母旣葬服勤事洞源不懈凡事役力辨不倦抛棄惡食必興愛惜辭而飯之七月洞源買藥至襄陽市毎入市令栢庭持裝槖栢庭必閉目處中洞源讓曰處衆而睡人奪汝携栢庭曰非有睡也悶衆之喧喧耳九月洞源南歸行及冝城去襄陽百餘里洞源遽曰香爐捐主人柰何栢庭請復取白洞源暫休以俟不時頃持爐還洞源驚問答曰尊師方在途恐留滯故疾行洞源信然七年二月朗州刺史胡叔清招洞源下郡赴之留栢庭山中植果藥踰二十日桐源來栢庭一不詰之答曰自尊師去州祇於僊林尋僊穴洞源問所尋何見答曰見石室石牀石几洞源曰石室何許曰約去一里半洞源疑而不窮又旬栢庭於藝圃中得一棊子捧呈洞源曰秦人棊子洞源異之曰誰爲謂汝烏知其然復曰是誠秦人棊子洞源諦視之狀若小龜光潤如玉遂貯籙囊中後因閱籙開嚢緘記如舊亡棊子矣夏四月忽白洞源願屈歸巖洞時久霖雨澍洞源旣未決信竟不果行八年五月二十七日始昕洞源命栢庭河畔視船往復不二里及午方回洞源訶之來何遅栢庭曰觀西南十五歩許有小橋橋上遇一老尊負杖掛物呼令隨去栢庭不敢由是晚三十早朝褫常所布帶以一紙繩束腰跣足履草屨昇尊殿及洞源嚴修之處各焚香跪拜旣而辭洞源又拜洞源凭几問曰汝辭吾安往答曰歸僊洞洞源曰吾隨汝可乎曰不可洞源又曰何爲不可栢庭曰前時尊師不決去廼今不可因諭洞源當以時遷棲洞源曰十年易居昔賢遺旨吾有志矣今汝去何時復見答曰期十八年洞源欲留之不尅即聲命同觀道士朱靈𧦬曰朱老師看僊人來靈𧦬睨栢庭曰童子今日顏色異常光輝洞源門人胡清鎬朱神靜童子陳景昕譚伯璡偕圜矚栢庭服短布衣烏繒巾逡廵却行三移歩忽然不見洞源與道徒皆愕眙庭際有一粟樹謂暫旁立洞源曰得無映樹乎求之無踪即聲鐘集觀戸將遍索林莽觀戸至東北林際遇一大蛇當路而止十一年兄僊信從辰州來聞弟登僊至桃源又師事洞源爲道士巖薜兩茂遊嵩山失所止建中元年四月洞源遷居江州廬山貞元五年十一月復遷居潤州茅山十八年春潤州郵檄人於延陵縣界見一少年前行行如人郵者促歩期及竟不能迭延陵闖茅山三十里郵人望見徐歩入山門是日女道士蕭冷無在鶴臺見少年持小漆函蓋貯素書直未及門舉一足履閾冷然問曰汝爲誰答曰瞿栢庭因問冷然黃尊師何在冷然指示路處髣髴記有栢庭名卒然不悟久之忽了辨即攝衣詣洞源問瞿栢庭來乎洞源唯唯不明諭秋八月旣朔之旬洞源謂門弟子曰吾將蹈滄海爲備裝或以未可行爲請踰一年當午桐源化眞造曰代人傳瞿童登僊之跡皆怪異可惑予自幼貶武陵守至之日則詳詢舊老廼詼詭加甚值暇日遊沅江滄浪合流聞之於漁人曰栢庭有同學陳景昕已五從居今復爲桃源觀道士易名通微又改正長始均執勞久鍊行事傳疑百說不若一見予得言忘食遂命迓之未獲至若不克見及期而朝門吏導景昕前庭冠青蘿冠碧緑衣冰顔雪膚皓髭蒼眉端簡足跡粛容陳詞予不知幸之喜之至也旣至休館徐徐閱所惑景爲具辨因裂櫝直紀用祛後疑長慶二年五月三日朗州刺史温造述上清三洞道士陳通微傳實此記乃簡興親箚曩爲好事者磨去重刻惟存碑側數字江淮異人録
